name: PR Coverage

on:
  pull_request:
    branches: [master]

permissions:
  pull-requests: write
  contents: read

jobs:
  coverage:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore CodeFab_TeamD.slnx

      - name: Build (Debug|x64)
        id: build
        continue-on-error: true
        run: msbuild CodeFab_TeamD.slnx /p:Configuration=Debug /p:Platform=x64 /m

      - name: Install OpenCppCoverage
        if: steps.build.outcome == 'success'
        run: choco install opencppcoverage -y

      - name: Run tests and capture pass/fail counts
        if: steps.build.outcome == 'success'
        id: tests
        shell: pwsh
        run: |
          $output = & "x64\Debug\CodeFab_TeamD.exe" 2>&1 | Tee-Object -Variable lines
          $lines | Out-File -FilePath test_output.txt -Encoding utf8

          $summary = $lines | Select-String -Pattern '\[==========\]\s+(\d+)\s+tests? from \d+ test suites ran' | Select-Object -Last 1
          $passedLine = $lines | Select-String -Pattern '\[\s*PASSED\s*\]\s+(\d+)\s+tests?' | Select-Object -Last 1

          $total = if ($summary) { $summary.Matches[0].Groups[1].Value } else { "?" }
          $passed = if ($passedLine) { $passedLine.Matches[0].Groups[1].Value } else { "?" }

          "total=$total" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "passed=$passed" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run tests under OpenCppCoverage
        if: steps.build.outcome == 'success'
        shell: pwsh
        run: |
          # 저장소 루트 폴더명 자체가 CodeFab_TeamD라서 "CodeFab_TeamD" 한 겹만 필터링하면
          # packages\gmock.1.11.0\... 같은 서드파티 소스까지 부분일치로 걸려 커버리지가
          # 희석된다(실제 프로덕션 소스는 CodeFab_TeamD\CodeFab_TeamD\*.cpp에 있음). 중첩된
          # 두 번째 폴더까지 명시해 packages/를 확실히 배제한다.
          $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
          & $openCppCoverage `
            --sources "CodeFab_TeamD\CodeFab_TeamD" `
            --excluded_sources "CodeFab_TeamD\CodeFab_TeamD\test" `
            --export_type cobertura:coverage.xml `
            -- "x64\Debug\CodeFab_TeamD.exe"

      - name: Compute coverage percentage
        if: steps.build.outcome == 'success'
        id: coverage
        shell: pwsh
        run: |
          [xml]$report = Get-Content coverage.xml
          $rate = [double]$report.coverage.'line-rate'
          $pct = [math]::Round($rate * 100, 2)
          "percentage=$pct" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Comment result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildOk = "${{ steps.build.outcome }}" === "success";
            const marker = "<!-- coverage-bot -->";

            const buildLine = buildOk ? "✅ 통과" : "❌ 실패";
            const testLine = buildOk
              ? `${{ steps.tests.outputs.passed }} / ${{ steps.tests.outputs.total }} Pass`
              : "빌드 실패로 실행되지 않음";
            const coverageLine = buildOk
              ? `${{ steps.coverage.outputs.percentage }}%`
              : "빌드 실패로 측정되지 않음";

            const body = `${marker}\n` +
              `### CI 결과\n` +
              `- **Build**: ${buildLine}\n` +
              `- **Test**: ${testLine}\n` +
              `- **Coverage**: ${coverageLine}\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if build failed
        if: steps.build.outcome != 'success'
        run: exit 1
