name: PR Coverage

on:
  pull_request:
    branches: [master]

permissions:
  pull-requests: write
  contents: read

jobs:
  coverage:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore CodeFab_TeamD.slnx

      - name: Build (Debug|x64)
        run: msbuild CodeFab_TeamD.slnx /p:Configuration=Debug /p:Platform=x64 /m

      - name: Install OpenCppCoverage
        run: choco install opencppcoverage -y

      - name: Run tests under OpenCppCoverage
        shell: pwsh
        run: |
          $openCppCoverage = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
          & $openCppCoverage `
            --sources "CodeFab_TeamD" `
            --excluded_sources "CodeFab_TeamD\test" `
            --export_type cobertura:coverage.xml `
            -- "x64\Debug\CodeFab_TeamD.exe"

      - name: Compute coverage percentage
        id: coverage
        shell: pwsh
        run: |
          [xml]$report = Get-Content coverage.xml
          $rate = [double]$report.coverage.'line-rate'
          $pct = [math]::Round($rate * 100, 2)
          "percentage=$pct" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pct = "${{ steps.coverage.outputs.percentage }}";
            const marker = "<!-- coverage-bot -->";
            const body = `${marker}\n### 📊 코드 커버리지: **${pct}%**\n(OpenCppCoverage 라인 커버리지 기준, \`CodeFab_TeamD/test\` 제외)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
